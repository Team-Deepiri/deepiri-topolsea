name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets --exclude dv-bindings-python -- -D warnings

      - name: Build
        run: cargo build --workspace --release

      - name: Test
        run: cargo test --workspace

  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Poetry
        run: pip install poetry

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Ruff lint
        run: poetry run ruff check deepiri_topolsea tests

      - name: Ruff format check
        run: poetry run ruff format --check deepiri_topolsea tests

      - name: Pytest
        run: poetry run pytest -q

  integration:
    runs-on: ubuntu-latest
    needs: [rust, python]
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Poetry
        run: pip install poetry

      - name: Build Rust CLI
        run: cargo build --release -p dv-cli

      - name: Smoke test CLI
        run: |
          ./target/release/topolsea --data-dir /tmp/topolsea-ci list
          ./target/release/topolsea --data-dir /tmp/topolsea-ci create smoke --dimension 4 --metric cosine
          ./target/release/topolsea --data-dir /tmp/topolsea-ci info smoke

      - name: Python smoke test
        run: |
          poetry install --no-interaction
          poetry run python -c "
          from deepiri_topolsea import Client
          c = Client('/tmp/topolsea-py')
          col = c.get_or_create_collection('docs', dimension=4, metric='cosine')
          col.upsert(['a'], [[1.0, 0.0, 0.0, 0.0]], [{'k': 'v'}])
          assert col.count() == 1
          hits = col.query([1.0, 0.0, 0.0, 0.0], top_k=1)
          assert hits[0].id == 'a'
          print('ok')
          "

# Exclude generated/build/runtime artifact paths.
paths-ignore:
  - '**/node_modules/**'
  - '**/dist/**'
  - '**/build/**'
  - '**/coverage/**'
  - '**/logs/**'
  - '**/*.min.js'
  - '**/*.pyc'
  - '**/__pycache__/**'
  - '**/.pytest_cache/**'
  - '**/.mypy_cache/**'
  - '**/.venv/**'
  - '**/venv/**'
  - '**/.env/**'
  - '**/.tox/**'
  - '**/target/**'
  - '**/native_data/**'
  - '**/data/**'
  - '**/docs/_build/**'
  - '**/site/**'
  - '**/benchmark-results/**'
